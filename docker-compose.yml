version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: customer_segmentation_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-customer_segmentation}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - csr_network

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: csr_api
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db        # always use service name inside Docker network
    ports:
      - "8000:8000"
    volumes:
      - ./models/artifacts:/app/models/artifacts:ro
      - ./mlruns:/app/mlruns:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - csr_network
    command: >
      uvicorn src.csr.api.main:app
      --host 0.0.0.0
      --port 8000

  # ── Streamlit Dashboard ─────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: csr_dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - csr_network
    command: >
      streamlit run dashboard/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true

  # ── MLflow ──────────────────────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: csr_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      sh -c "pip install mlflow -q &&
             mlflow ui
             --host 0.0.0.0
             --port 5000
             --backend-store-uri /mlruns"
    networks:
      - csr_network

volumes:
  postgres_data:
    driver: local

networks:
  csr_network:
    driver: bridge